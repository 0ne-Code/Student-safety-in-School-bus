<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Bus Safety System</title>
  <meta name="description" content="Smart school bus tracking and child safety system.">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .redirect-box {
      text-align: center;
    }

    .redirect-box .bus {
      font-size: 52px;
      margin-bottom: 16px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .redirect-box p {
      color: var(--c-text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }
  </style>
</head>

<body>
  <div class="redirect-box">
    <div class="bus">🚌</div>
    <h2 style="font-size:18px;font-weight:800;color:var(--c-primary);">School Bus Safety System</h2>
    <p>Redirecting you…</p>
  </div>

  <script>
    (async () => {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.replace('/login.html'); return; }
        const user = await res.json();
        if (user.role === 'admin') window.location.replace('/admin.html');
        else if (user.role === 'staff') window.location.replace('/scanner.html');
        else window.location.replace('/parent.html');
      } catch {
        window.location.replace('/login.html');
      }
    })();
  </script>
</body>

</html>
